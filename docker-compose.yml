version: '3.8'

services:
  zendanbot:
    build: .
    container_name: zendanbot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./zendanbot.db:/app/zendanbot.db
      - ./backups:/app/backups
    ports:
      - "8000:8000"

  # PostgreSQL for production (optional)
